<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <!-- radar sweep arcs -->
  <g stroke="#ffffff" fill="none" stroke-opacity="0.30" stroke-width="2">
    <path d="M120 360 A 260 260 0 0 1 640 360"/>
    <path d="M190 360 A 190 190 0 0 1 570 360"/>
    <path d="M260 360 A 120 120 0 0 1 500 360"/>
    <line x1="380" y1="360" x2="380" y2="120"/>
    <line x1="380" y1="360" x2="600" y2="200"/>
    <line x1="380" y1="360" x2="160" y2="200"/>
  </g>
  <!-- radar returns / depth points -->
  <g fill="#ffffff">
    <circle cx="380" cy="150" r="9"/><circle cx="300" cy="220" r="6" fill-opacity="0.8"/>
    <circle cx="470" cy="200" r="7" fill-opacity="0.85"/><circle cx="540" cy="250" r="5" fill-opacity="0.7"/>
    <circle cx="250" cy="280" r="5" fill-opacity="0.7"/>
  </g>
  <text x="56" y="96" fill="#ffffff" font-size="26" font-weight="600" opacity="0.92">Project · Radar-Camera Depth</text>
  <text x="56" y="404" fill="#ffffff" font-size="52" font-weight="800" letter-spacing="0.5">SemoDepth</text>
  <text x="56" y="438" fill="#ffffff" font-size="20" opacity="0.9">Radar-Modulated State Space Models</text>
</svg>
