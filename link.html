    <!-- Inline theme toggle script (works without external dependencies) -->
    <script>
        function getTimeBasedTheme() {
            const hour = new Date().getHours();
            return (hour >= 19 || hour < 7) ? 'dark' : 'light';
        }

        (function() {
            const manuallySet = localStorage.getItem('themeManuallySet');
            let theme;
            if (manuallySet === 'true') {
                theme = localStorage.getItem('theme') || getTimeBasedTheme();
            } else {
                theme = getTimeBasedTheme();
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();

        document.addEventListener('DOMContentLoaded', function() {
            const themeToggleBtn = document.getElementById('theme-toggle');
            if (themeToggleBtn) {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const icon = themeToggleBtn.querySelector('.theme-toggle-icon');
                const text = themeToggleBtn.querySelector('.theme-toggle-text');
                if (currentTheme === 'dark') {
                    icon.textContent = '☀️';
                    text.textContent = 'Light Mode';
                }

                themeToggleBtn.addEventListener('click', function() {
                    const current = document.documentElement.getAttribute('data-theme');
                    const newTheme = current === 'dark' ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-theme', newTheme);
                    localStorage.setItem('theme', newTheme);
                    localStorage.setItem('themeManuallySet', 'true');
                    icon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
                    text.textContent = newTheme === 'dark' ? 'Light Mode' : 'Dark Mode';
                });

                themeToggleBtn.addEventListener('dblclick', function() {
                    localStorage.removeItem('themeManuallySet');
                    const autoTheme = getTimeBasedTheme();
                    document.documentElement.setAttribute('data-theme', autoTheme);
                    localStorage.setItem('theme', autoTheme);
                    icon.textContent = autoTheme === 'dark' ? '☀️' : '🌙';
                    text.textContent = autoTheme === 'dark' ? 'Light Mode' : 'Dark Mode';
                });
            }
        });
    </script>
